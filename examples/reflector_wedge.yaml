# Reflector family (S9-B): WEDGE angular-bias demo. The wedge is a tilted plane:
# its built-in angle alpha_w (20 mrad here) shifts the working point in the
# ANGULAR coordinate (return-beam offset 2*alpha_w), while -- being flat -- it
# keeps zero displacement sensitivity. At alpha_w = 0 it degenerates to the
# plane. The tip tilt theta_y = 1.377*dx/L rides on the angular bias, so a tone
# couples through the tilt channel about the biased operating point (doc 03 §c).
# Run from the repo root:  optivibe run examples/reflector_wedge.yaml
name: reflector-wedge-angular-bias
variant: wedge_demo

excitation:
  kind: sine
  axis: x
  fs_hz: 5000.0
  duration_s: 1.0
  frequency_hz: 120.0
  amplitude_g: 10.0

stages:
  excitation: sine
  mechanics: modal
  optics: reflector        # shape-dispatching optics; wedge via the variant

seed: 12345

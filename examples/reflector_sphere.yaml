# Reflector family (S9-B): SPHERE isotropy demo. The convex sphere is curved in
# BOTH planes, so -- unlike the cylinder -- a tone on the *non-target* y axis is
# NOT suppressed: the dominant line sits at the drive frequency 120 Hz (linear,
# 1f), not at 2f. Compare with examples/cross_axis.yaml (same y drive on the
# cylinder variant B), whose response is quadratic at 2f = 240 Hz. The sphere
# carries equal sensitivity on x and y (anisotropy -> 1; doc 03 §c, S9-B).
# Run from the repo root:  optivibe run examples/reflector_sphere.yaml
name: reflector-sphere-isotropy
variant: sphere_demo

excitation:
  kind: sine
  axis: y                  # non-target axis -- suppressed on cylinder, NOT on sphere
  fs_hz: 5000.0
  duration_s: 1.0
  frequency_hz: 120.0
  amplitude_g: 10.0

stages:
  excitation: sine
  mechanics: modal
  optics: reflector        # shape-dispatching optics; sphere via the variant

seed: 12345

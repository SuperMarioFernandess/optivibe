# Cross-axis sensitivity demo (S3) — a strong 10 g tone on the *non-target*
# axis y of variant B. Pure dy leaves the cylinder coupling exactly unchanged
# (mirror symmetry, doc 03 §4); the only residual enters through the
# mechanically coupled tilt theta_x = 1.377 dy / L and is *quadratic* at the
# working point, so the optical response is suppressed by ~5.9 orders (x ~ 7.4e5 at 10 g) relative
# to the same tone on x and its dominant line sits at 2f = 240 Hz (doc 04 §5).
# Run from the repo root:  optivibe run examples/cross_axis.yaml
name: cross-axis
variant: B

excitation:
  kind: sine
  axis: y                  # non-target axis
  fs_hz: 5000.0
  duration_s: 1.0
  frequency_hz: 120.0
  amplitude_g: 10.0

stages:
  excitation: sine
  mechanics: modal
  optics: cylinder         # physical S3 optics (explicit for clarity)

seed: 12345

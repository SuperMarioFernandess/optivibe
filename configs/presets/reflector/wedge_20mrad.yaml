# Built-in reflector preset: metallized WEDGE mirror (tilted plane; docs 03/08).
# A flat mirror with a fixed built-in face tilt alpha_w; reflection doubles it,
# so the return beam carries a constant angular offset 2*alpha_w -> the working
# point is biased in the ANGULAR coordinate (not by decentering). At alpha_w = 0
# it degenerates to the plane (doc 03 §c, S9-B). No curvature, so no
# displacement sensitivity. SI units throughout.
shape: wedge
metallization_rho: 0.98       # mirror reflectivity rho (doc 08 §6)
gap_m: 31.0e-6                # air gap A (doc 03 §6)
bias_offset_m: 0.0            # ignored by a flat mirror (angular bias instead)
wedge_angle_rad: 0.02         # built-in wedge angle alpha_w (20 mrad; paraxial, doc 03 §c)

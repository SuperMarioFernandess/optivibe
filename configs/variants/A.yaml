# Variant A -- low-frequency, high-resolution (doc 08 §6.2/§6.3).
# Composed form (S9-A): subsystem presets + per-subsystem overrides. Resolves
# bit-identically to the former flat variant. Common optical platform R-40:
# lambda=1550 nm, rho=0.98, R=1 A/W, R1=0.036, route 2, eta0 bias ~0.25.
# Values are SI except named-unit fields (g, ug/sqrt(Hz), dB/Hz).
name: A
description: low-frequency high-resolution (0.1-100 Hz)
mode: offresonance
band:
  f_min_hz: 0.1
  f_max_hz: 100.0
full_scale_g: 5.0
route: 2
eta_bias: 0.25
# Q_total at L=5.0 mm: DERIVED via Q_air ~ 1/L (doc 07 §2.3); refined by the
# computable Q(L) model (loop, doc 14 §8). Variant-specific -> stays here.
q_total: 1430.0
target_nea_ug_rthz: 1.0   # target ~1 ug/sqrt(Hz) (NEA ~0.1-0.5 achievable)
vacuum: false
source:
  preset: sld
  overrides:
    power_w: 0.020          # 20 mW (range 20-50 mW); SLD default is 16 mW
fiber:
  preset: smf28
cantilever:
  preset: silica
  overrides:
    length_m: 5.0e-3        # L = 5.0 mm -> f1 ~ 4.0 kHz
reflector:
  preset: cyl_rc62          # R_c = 62.5 um, Delta x0 = 2.0 um (doc 03 §5)
detector:
  preset: balanced_24bit
  overrides:
    adc_full_scale: 5.0e-4  # +/- range, A (~1.3x the ~0.35 mA FS swing at 5 g)

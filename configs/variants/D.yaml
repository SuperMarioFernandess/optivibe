# Variant D -- resonant narrowband at the 5 kHz line (optional; doc 08 §6.2/§6.3).
# Composed form (S9-A). Resolves bit-identically to the former flat variant.
# Differs from the common platform: DFB source + route 1 (AR endface), high
# power, vacuum for high Q. The band below is an S0 placeholder bracketing the
# line until doc 08 fixes it (transparent per the "no fudging" rule).
name: D
description: resonant narrowband at 5 kHz line (optional)
mode: resonance
line_freq_hz: 5000.0      # f_line = f1 (tuned), L = 4.47 mm
band:
  f_min_hz: 4750.0        # placeholder +/-5% bracket around the line (S0)
  f_max_hz: 5250.0
full_scale_g: 0.022       # FS = 22 mg
route: 1
eta_bias: 0.25
# Q_total at L=4.47 mm in air = 1500 -- doc 08 §5 (air-limited; FS derived with it).
q_total: 1500.0
target_nea_ug_rthz: 0.22  # ~0.22 ug/sqrt(Hz), toward ng in vacuum
vacuum: true
source:
  preset: dfb               # 100 mW, RIN -155 dB/Hz
fiber:
  preset: smf28
cantilever:
  preset: silica
  overrides:
    length_m: 4.47e-3
reflector:
  preset: cyl_rc31          # R_c = 31 um, Delta x0 = 0.992 um (doc 08 §2 scaling)
detector:
  preset: balanced_24bit
  overrides:
    adc_full_scale: 1.3e-2  # +/- range, A (~1.3x the ~9.5 mA resonant FS swing)

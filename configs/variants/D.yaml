# Variant D — resonant narrowband at the 5 kHz line (optional; doc 08 §6.2/§6.3).
# Differs from the common platform: DFB source + route 1 (AR endface), high power,
# vacuum for high Q (NEA reaches sub-ug toward ng). The target band below is an
# S0 placeholder bracketing the line until doc 08 fixes it (transparent per the
# "no fudging" rule); the test only asserts the documented fields.
name: D
description: resonant narrowband at 5 kHz line (optional)
mode: resonance
line_freq_hz: 5000.0      # f_line = f1 (tuned), L = 4.47 mm
band:
  f_min_hz: 4750.0        # placeholder +/-5% bracket around the line (S0)
  f_max_hz: 5250.0
length_m: 4.47e-3
full_scale_g: 0.022       # FS = 22 mg
reflector:
  shape: cylinder
  radius_of_curvature_m: 31.0e-6   # R_c
  reflectivity: 0.98
source:
  kind: DFB
  wavelength_m: 1550.0e-9
  power_w: 0.100          # 100 mW
  rin_db_hz: -155.0
# Q_total at L=4.47 mm in air = 1500 — doc 08 §5 (Q_air(4.47mm)~1500,
# air-limited; FS=22 mg of this variant was derived with this Q).
# Vacuum Q (1e4..1e5) is deferred with the Q(L) model (loop, 14 §8).
q_total: 1500.0
route: 1
responsivity_a_w: 1.0
endface_reflectivity: 0.036
eta_bias: 0.25
target_nea_ug_rthz: 0.22  # ~0.22 ug/sqrt(Hz), toward ng in vacuum
vacuum: true
# Optical working point (doc 03 §1/§6; S3 calibration, journal 2026-06-12).
# Scale-equivalent bias for R_c = 31 um: Delta x0 = 2 um * (31/62.5) = 0.992 um —
# since sigma ~ R_c (doc 04 §4), this keeps eta0/eta_peak at the documented
# working-point ratio of the R_c = 62.5 um platform (doc 08, R-40).
optics:
  gap_m: 31.0e-6            # air gap A (parametric band 20-40 um, doc 03 §6)
  bias_offset_m: 0.992e-6   # Delta x0 scaled by R_c ratio (doc 08 §2 scaling)
  mode_field_radius_m: 5.2e-6  # w0 at 1550 nm, SMF-28 (doc 03 §1)

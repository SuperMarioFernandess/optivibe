# Variant B — general-purpose wideband (doc 08 §6.2/§6.3).
# Common optical platform R-40 (see A). Values SI except named-unit fields.
name: B
description: general-purpose wideband (1 Hz-10 kHz)
mode: offresonance
band:
  f_min_hz: 1.0
  f_max_hz: 10000.0
length_m: 2.0e-3          # L = 2.0 mm  -> f1 ~ 25 kHz
full_scale_g: 50.0
reflector:
  shape: cylinder
  radius_of_curvature_m: 31.0e-6   # R_c
  reflectivity: 0.98
source:
  kind: SLD
  wavelength_m: 1550.0e-9
  power_w: 0.016          # 16 mW
  rin_db_hz: -126.0
# Q_total at L=2.0 mm = 2610 — tabulated (doc 07 §4.3 scaling table;
# doc 08 §3.B: L=2.0 mm coincides with the Q_total(L) peak ~2610).
q_total: 2610.0
route: 2
responsivity_a_w: 1.0
endface_reflectivity: 0.036
eta_bias: 0.25
target_nea_ug_rthz: 10.0  # target ~10 ug/sqrt(Hz) (NEA ~10.6 modelled)
vacuum: false
# Optical working point (doc 03 §1/§6; S3 calibration, journal 2026-06-12).
# Scale-equivalent bias for R_c = 31 um: Delta x0 = 2 um * (31/62.5) = 0.992 um —
# since sigma ~ R_c (doc 04 §4), this keeps eta0/eta_peak at the documented
# working-point ratio of the R_c = 62.5 um platform (doc 08, R-40).
optics:
  gap_m: 31.0e-6            # air gap A (parametric band 20-40 um, doc 03 §6)
  bias_offset_m: 0.992e-6   # Delta x0 scaled by R_c ratio (doc 08 §2 scaling)
  mode_field_radius_m: 5.2e-6  # w0 at 1550 nm, SMF-28 (doc 03 §1)
# Detector front-end and ADC (docs 07/08; S4). Balanced channel + CMRR 40 dB
# (auto-balanced range 30-70 dB, doc 07 §1.2); 30 dB suffices only near 1 mW,
# so 40 dB keeps the 16 mW read-out shot-limited (RIN does not improve with
# power). Rf = 100 kOhm is the Johnson floor (doc 07 §1.3). AC-coupled ADC
# (doc 07 §1.4); FS swing |s_target|*FS*g0 ~ 95 uA at 50 g.
detector:
  balanced: true
  cmrr_db: 40.0
  transimpedance_ohm: 1.0e5
  output: current
  adc_bits: 24
  adc_full_scale: 1.3e-4      # +/- range, A (~1.3x the ~95 uA FS swing at 50 g)

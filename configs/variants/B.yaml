# Variant B — general-purpose wideband (doc 08 §6.2/§6.3).
# Common optical platform R-40 (see A). Values SI except named-unit fields.
name: B
description: general-purpose wideband (1 Hz-10 kHz)
mode: offresonance
band:
  f_min_hz: 1.0
  f_max_hz: 10000.0
length_m: 2.0e-3          # L = 2.0 mm  -> f1 ~ 25 kHz
full_scale_g: 50.0
reflector:
  shape: cylinder
  radius_of_curvature_m: 31.0e-6   # R_c
  reflectivity: 0.98
source:
  kind: SLD
  wavelength_m: 1550.0e-9
  power_w: 0.016          # 16 mW
  rin_db_hz: -126.0
# Q_total at L=2.0 mm = 2610 — tabulated (doc 07 §4.3 scaling table;
# doc 08 §3.B: L=2.0 mm coincides with the Q_total(L) peak ~2610).
q_total: 2610.0
route: 2
responsivity_a_w: 1.0
endface_reflectivity: 0.036
eta_bias: 0.25
target_nea_ug_rthz: 10.0  # target ~10 ug/sqrt(Hz) (NEA ~10.6 modelled)
vacuum: false

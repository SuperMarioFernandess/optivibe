# Variant B -- general-purpose wideband (doc 08 §6.2/§6.3).
# Composed form (S9-A). Resolves bit-identically to the former flat variant.
# Common optical platform R-40 (see A). SI except named-unit fields.
name: B
description: general-purpose wideband (1 Hz-10 kHz)
mode: offresonance
band:
  f_min_hz: 1.0
  f_max_hz: 10000.0
full_scale_g: 50.0
route: 2
eta_bias: 0.25
# Q_total at L=2.0 mm = 2610 -- tabulated (doc 07 §4.3; doc 08 §3.B peak).
q_total: 2610.0
target_nea_ug_rthz: 10.0  # target ~10 ug/sqrt(Hz) (NEA ~10.6 modelled)
vacuum: false
source:
  preset: sld               # 16 mW, RIN -126 dB/Hz (no override)
fiber:
  preset: smf28
cantilever:
  preset: silica
  overrides:
    length_m: 2.0e-3        # L = 2.0 mm -> f1 ~ 25 kHz
reflector:
  preset: cyl_rc31          # R_c = 31 um, Delta x0 = 0.992 um (doc 08 §2 scaling)
detector:
  preset: balanced_24bit    # adc_full_scale 1.3e-4 A (~1.3x ~95 uA FS at 50 g)

# Variant C -- high-frequency wideband (doc 08 §6.2/§6.3).
# Composed form (S9-A). Resolves bit-identically to the former flat variant.
# Common optical platform R-40 (see A). SI except named-unit fields.
name: C
description: high-frequency wideband (10 Hz-20 kHz)
mode: offresonance
band:
  f_min_hz: 10.0
  f_max_hz: 20000.0
full_scale_g: 50.0
route: 2
eta_bias: 0.25
# Q_total at L=1.41 mm = 1950 -- conservative documented value (doc 07 §2.3, R-26).
q_total: 1950.0
target_nea_ug_rthz: 40.0  # target ~30-50 ug/sqrt(Hz) (NEA ~24-43 modelled)
vacuum: false
source:
  preset: sld               # 16 mW (range 16-50 mW)
fiber:
  preset: smf28
cantilever:
  preset: silica
  overrides:
    length_m: 1.41e-3       # L = 1.41 mm -> f1 ~ 50 kHz
reflector:
  preset: cyl_rc31          # R_c = 31 um, Delta x0 = 0.992 um (doc 08 §2 scaling)
detector:
  preset: balanced_24bit
  overrides:
    adc_full_scale: 3.5e-5  # +/- range, A (~1.5x the ~24 uA FS swing at 50 g)

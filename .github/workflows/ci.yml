name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt system libraries
        # PySide6 wheels bundle Qt itself but link against system OpenGL/EGL,
        # xkbcommon, dbus and fontconfig; bare runners lack them (libEGL.so.1).
        # Needed even for QT_QPA_PLATFORM=offscreen: pytest-qt imports QtGui at
        # configure time, so a missing .so kills the whole test session.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create venv and install (core + dev + gui)
        # The runner's system Python is externally managed (PEP 668, Ubuntu 24.04),
        # so we install into a project venv instead of using --system.
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev,gui]"

      - name: Add venv to PATH
        run: echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage
        env:
          QT_QPA_PLATFORM: offscreen   # headless Qt for the GUI smoke test
        run: pytest --cov=optivibe --cov-report=term-missing --cov-fail-under=85

      - name: Head-less scenario run
        run: optivibe run examples/hello.yaml

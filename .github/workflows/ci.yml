name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Action majors are pinned to the versions that were green for this repo
# (checkout@v5, setup-uv@v7, upload-artifact@v4, Pages v3/v4/v5). Re-verify
# before the Node-20 runtime sunset (GitHub Actions, ~2026-09).
jobs:
  quality:
    name: Lint, types, tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt system libraries
        # PySide6 wheels bundle Qt itself but link against system OpenGL/EGL,
        # xkbcommon, dbus and fontconfig; bare runners lack them (libEGL.so.1).
        # Needed even for QT_QPA_PLATFORM=offscreen: pytest-qt imports QtGui at
        # configure time, so a missing .so kills the whole test session.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync locked environment (core + dev + gui + io-formats)
        # `uv sync --locked` installs the exact versions from uv.lock (notably
        # numpy 2.4.6): a fresh resolve would pull a newer numpy whose typed
        # stubs use 3.12-only syntax and break mypy under python 3.11. Pinning
        # the interpreter to 3.11 matches the mypy target.
        run: uv sync --locked --python 3.11 --extra dev --extra gui --extra io-formats

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests + coverage
        env:
          QT_QPA_PLATFORM: offscreen   # headless Qt for the GUI smoke test
        run: uv run pytest --cov=optivibe --cov-report=term-missing --cov-fail-under=85

      - name: Head-less scenario run (synthetic)
        run: uv run optivibe run examples/hello.yaml

      - name: Head-less scenario run (instrument replay, io-formats)
        run: uv run optivibe run examples/replay_tdms.yaml

  package-windows:
    name: Package desktop app (Windows)
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync locked environment (gui + io-formats + packaging + dev)
        run: uv sync --locked --python 3.11 --extra gui --extra io-formats --extra packaging --extra dev

      - name: Core + loader tests (no GUI)
        # Proves the physics core and the instrument loaders import and pass on
        # Windows (the packaging target). GUI/Qt tests are excluded here; their
        # full run lives in the Linux `quality` job under offscreen Qt.
        run: uv run pytest -m "not gui" -q

      - name: Build one-dir bundle (PyInstaller)
        run: uv run pyinstaller packaging/optivibe-gui.spec --noconfirm

      # NOTE: a GUI smoke (launch + run a scenario) cannot be automated on a
      # headless runner; it is a documented manual step (docs/packaging.md).
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: optivibe-gui-windows-${{ github.sha }}
          path: dist/OptiVibe
          if-no-files-found: error
          retention-days: 14

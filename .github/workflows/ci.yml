name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install (core + dev + gui)
        run: uv pip install --system -e ".[dev,gui]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage
        env:
          QT_QPA_PLATFORM: offscreen   # headless Qt for the GUI smoke test
        run: pytest --cov=optivibe --cov-report=term-missing --cov-fail-under=85

      - name: Head-less scenario run
        run: optivibe run examples/hello.yaml

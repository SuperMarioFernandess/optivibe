site_name: OptiVibe
site_description: Digital twin of a fiber-optic vibration sensor
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - User guide: user-guide.md
  - Importing measured data: data-import.md
  - Physics → code map: physics-map.md
  - Architecture: architecture.md
  - Packaging: packaging.md
  - API reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
